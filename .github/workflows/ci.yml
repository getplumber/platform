name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  code-analysis:
    name: Code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3.1.0
        with:
          fetch-depth: 0
      - name: Install Helm
        uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5
        with:
          version: 3.10.1
      - name: Install Python
        uses: actions/setup-python@v4.3.0
        with:
          python-version: 3.11
      - name: Install chart-testing
        uses: helm/chart-testing-action@afea100a513515fbd68b0e72a7bb0ae34cb62aec # v2.3.1
      - name: Add dependency chart repositories
        run: ./scripts/add_helm_repo.sh
      - name: List changed charts
        id: list-changed
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          changed=$(ct list-changed --target-branch "$DEFAULT_BRANCH")
          charts=$(echo "$changed" | tr '\n' ' ' | xargs)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed_charts=$charts" >> $GITHUB_OUTPUT
          fi
      - name: Lint charts
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: ct lint --target-branch "$DEFAULT_BRANCH"
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: d3adb5/helm-unittest-action@850bc76597579183998069830d5fa8c3ef0ea34a # 2.5.0
        with:
          charts: charts/plumber
          flags: --color -o test-results.xml --output-type JUnit
          helm-version: v3.10.1
          # helm-unittest v1.1.0 (2026-05-08) switched plugin.yaml to the
          # platformHooks/platformCommand schema, which Helm 3.10.1 cannot
          # parse. Pin to the last v1.x release using the legacy schema.
          unittest-version: v1.0.3
      - name: Test Report
        uses: dorny/test-reporter@dc3a92680fcc15842eef52e8c4606ea7ce6bd3f3 # v2.1.1
        if: ${{ !cancelled() }}   # run this step even if previous step failed
        with:
          name: Helm Unit Tests   # Name of the check run which will be created
          path: test-results.xml  # Path to test results
          reporter: java-junit    # Format of test results

