# -- Additional annotations applied to all resources.
additionalAnnotations: {}

# -- Additional labels applied to all resources.
additionalLabels: {}

# -- Global image registry override. When set, images are pulled as <imageRegistry>/<imageName>:<tag>.
# Leave empty to use the full path from each component's `image` field (default behavior).
imageRegistry: ""

# -- Global image pull secrets for pulling from private registries.
imagePullSecrets: []
  # - name: my-registry-secret

front:
  enabled: true
  type: frontend
  name: plumber-front
  # -- Full image path (used when imageRegistry is empty).
  image: docker.io/getplumber/frontend
  # -- Image name without registry prefix (used when imageRegistry is set).
  imageName: getplumber/frontend
  # -- Image pull policy for the container.
  imagePullPolicy: Always
  tag: v2.34.6
  replicaCount: 1
  revisionHistoryLimit: 5
  port: 3000
  livenessEndpoint: "/"
  readinesspoint: "/"
  debug: false
  allowExternalQueries: true
  extraEnv: []
    # Additional frontend environment variables can be added here:
    # - name: CUSTOM_VAR
    #   value: "custom-value"
  host: ""
  tls:
    secretName: ""
  resources: {}
    # limits:
    #   cpu: 200m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 64Mi
  extraIngressAnnotations: {}
  # -- Security context for front containers.
  securityContext:
    # -- Allow privilege escalation within the container.
    allowPrivilegeEscalation: false
    capabilities:
      # -- Drop specified Linux capabilities.
      drop: [ALL]
    # -- Run the container in privileged mode.
    privileged: false
    # -- Enforce running the container as non-root. Leave `false` until the image is able to be run in rootless mode.
    runAsNonRoot: false
    # -- Run the container as the specified user id (uid). Leave `0` until the image is able to be run in rootless mode.
    runAsUser: 0
    # -- Run the container as the specified group id (gid). Leave `0` until the image is able to be run in rootless mode.
    runAsGroup: 0
    seccompProfile:
      # -- The Seccomp profile to apply to this container.
      type: RuntimeDefault
  # -- Optional security context for pods.
  podSecurityContext: {}
  automountServiceAccountToken: true

  # NodeSelector is a selector which must be true for the pod to fit on a node.
  # Selector which must match a node's labels for the pod to be scheduled on that node.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}

  # Optional pod node tolerations.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations: []

backend:
  enabled: true
  type: backend
  name: plumber-backend
  # -- Full image path (used when imageRegistry is empty).
  image: docker.io/getplumber/backend
  # -- Image name without registry prefix (used when imageRegistry is set).
  imageName: getplumber/backend
  # -- Image pull policy for the container.
  imagePullPolicy: Always
  tag: v2.38.0
  replicaCount: 1
  revisionHistoryLimit: 5
  port: 3000
  livenessEndpoint: "/api/health/alive"
  readinesspoint: "/api/health/ready"
  host: ""
  tls:
    secretName: ""
  # Duration of users' session
  sessionTTL: "168h"
  resources: {}
  # -- Optional existing service account name to use.
  serviceAccountName: ""
  extraIngressAnnotations: {}
  # -- Security context for backend containers.
  securityContext:
    # -- Allow privilege escalation within the container.
    allowPrivilegeEscalation: false
    capabilities:
      # -- Drop specified Linux capabilities.
      drop: [ALL]
    # -- Run the container in privileged mode.
    privileged: false
    # -- Enforce running the container as non-root. Leave `false` until the image is able to be run in rootless mode.
    runAsNonRoot: false
    # -- Run the container as the specified user id (uid). Leave `0` until the image is able to be run in rootless mode.
    runAsUser: 0
    # -- Run the container as the specified group id (gid). Leave `0` until the image is able to be run in rootless mode.
    runAsGroup: 0
    seccompProfile:
      # -- The Seccomp profile to apply to this container.
      type: RuntimeDefault
  # -- Optional security context for pods.
  podSecurityContext: {}
  automountServiceAccountToken: true

  # NodeSelector is a selector which must be true for the pod to fit on a node.
  # Selector which must match a node's labels for the pod to be scheduled on that node.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}

  # Optional pod node tolerations.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations: []

  # Not using secret for Plumber secrets (comment if you use secret)
  extraEnv:
    - name: SECRET_KEY
      value: "<secret-key>"
    - name: GITLAB_OAUTH2_CLIENT_ID
      value: "<gitlab-oauth2-client-id>"
    - name: GITLAB_OAUTH2_CLIENT_SECRET
      value: "<gitlab-oauth2-client-secret>"

  # Using existing secret for Plumber secrets (uncomment if you use secret)
  # extraEnv:
  #   - name: SECRET_KEY
  #     valueFrom:
  #       secretKeyRef:
  #         name: "plumber-secret"
  #         key: "secret-key"
  #   - name: GITLAB_OAUTH2_CLIENT_ID
  #     valueFrom:
  #       secretKeyRef:
  #         name: "plumber-secret"
  #         key: "gitlab-oauth2-client-id"
  #   - name: GITLAB_OAUTH2_CLIENT_SECRET
  #     valueFrom:
  #       secretKeyRef:
  #         name: "plumber-secret"
  #         key: "gitlab-oauth2-client-secret"

gitlab:
  domain: "https://gitlab.com"
  organization: ""

worker:
  enabled: true
  type: backend
  name: plumber-worker
  # -- Full image path (used when imageRegistry is empty).
  image: docker.io/getplumber/backend
  # -- Image name without registry prefix (used when imageRegistry is set).
  imageName: getplumber/backend
  # -- Image pull policy for the container.
  imagePullPolicy: Always
  tag: v2.38.0
  replicaCount: 5
  revisionHistoryLimit: 5
  args:
    - "--worker"
  livenessEndpoint: "/job/health/alive"
  readinesspoint: "/job/health/ready"
  extraEnv: []
  addBackendExtraEnv: true
  host: ""
  tls: {}
  resources: {}
  # -- Optional existing service account name to use.
  serviceAccountName: ""
  automountServiceAccountToken: true
  # -- Security context for worker containers.
  securityContext:
    # -- Allow privilege escalation within the container.
    allowPrivilegeEscalation: false
    capabilities:
      # -- Drop specified Linux capabilities.
      drop: [ALL]
    # -- Run the container in privileged mode.
    privileged: false
    # -- Enforce running the container as non-root. Leave `false` until the image is able to be run in rootless mode.
    runAsNonRoot: false
    # -- Run the container as the specified user id (uid). Leave `0` until the image is able to be run in rootless mode.
    runAsUser: 0
    # -- Run the container as the specified group id (gid). Leave `0` until the image is able to be run in rootless mode.
    runAsGroup: 0
    seccompProfile:
      # -- The Seccomp profile to apply to this container.
      type: RuntimeDefault
  # -- Optional security context for pods.
  podSecurityContext: {}

  # NodeSelector is a selector which must be true for the pod to fit on a node.
  # Selector which must match a node's labels for the pod to be scheduled on that node.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}

  # Optional pod node tolerations.
  # For more info see https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  tolerations: []

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod

# Custom certificates
customCertificateAuthority:
  existingSecret: ""
  configMapName: ""
  certificates: []
  # - name: rootCA.crt # Must have the .crt extension
  #   value: |
  #     -----BEGIN CERTIFICATE-----
  #     (SNIPPED FOR BREVITY)
  #     -----END CERTIFICATE-----

# External PostgreSQL
postgresql:
  custom:
    host: ""
    dbName: "plumber"
    sslmode: "disable"
    port: 5432
  global:
    postgresql:

      # Not using secret for auth (comment if you use secret)
      auth:
        username: plumber
        password: secretpassword
        postgresPassword: secretpassword

      # Using existing secret for auth password (uncomment if you use secret)
      # auth:
      #   username: plumber
      #   existingSecret: "postgresql-secret"
      #   existingSecretType: "csi" # Remove or leave empty if secret is not managed by CSI Driver
      #   secretKeys:
      #     adminPasswordKey: "password"
      #     userPasswordKey: "password"

# Redis
redis:
  # -- Set to true to deploy a Redis instance as part of this chart.
  # When false, Redis is treated as an external dependency — provide connection details in custom below.
  deploy: false

  # Image configuration for the bundled Redis instance (only used when deploy is true).
  image:
    # -- Optional registry prefix (e.g. my-private-registry.example.com).
    # When set, the image is pulled as <registry>/<repository>:<tag>.
    # Leave empty to use repository as-is.
    registry: ""
    # -- Image repository. Override to pull from a mirror or private registry.
    repository: redis
    # -- Image tag.
    tag: "8.4"
    # -- Optional content-addressable digest (sha256:...).
    # When set, pins the exact image version regardless of tag.
    digest: ""
    # -- Pull policy for the Redis image.
    pullPolicy: IfNotPresent

  # -- Security context for the Redis container.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
    privileged: false
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    seccompProfile:
      type: RuntimeDefault

  # -- Security context for the Redis pod.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault

  # Connection details for the Redis instance (used whether deployed by this chart or external).
  # When deploy is true and custom.host is empty, the host defaults to <release>-redis-master.
  custom:
    host: ""
    user: "default"
    port: 6379
    cert: ""
    databaseIndex: 0

  # Not using secret for auth (comment if you use secret)
  auth:
    password: secretpassword

  # Using existing secret for auth (uncomment if you use secret)
  # auth:
  #   existingSecret: "redis-secret"
  #   existingSecretPasswordKey: "password"
