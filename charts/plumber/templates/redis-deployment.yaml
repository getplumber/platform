{{- if .Values.redis.deploy }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-redis-master" .Release.Name }}
  labels:
    app: {{ printf "%s-redis-master" .Release.Name }}
    app.kubernetes.io/name: {{ printf "%s-redis-master" .Release.Name }}
    {{- range $key, $val := .Values.additionalLabels }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
  {{- with .Values.additionalAnnotations }}
  annotations:
    {{- range $key, $val := . }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ printf "%s-redis-master" .Release.Name }}
      app.kubernetes.io/name: {{ printf "%s-redis-master" .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ printf "%s-redis-master" .Release.Name }}
        app.kubernetes.io/name: {{ printf "%s-redis-master" .Release.Name }}
        {{- range $key, $val := .Values.additionalLabels }}
        {{ $key }}: {{ $val | quote }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: redis
          image: {{ include "plumber.redisImage" . }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if or .Values.redis.auth.existingSecret .Values.redis.auth.password }}
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              {{- if .Values.redis.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.auth.existingSecret | quote }}
                  key: {{ .Values.redis.auth.existingSecretPasswordKey | quote }}
              {{- else }}
              value: {{ .Values.redis.auth.password | quote }}
              {{- end }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {}
          {{- with .Values.redis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
